  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    button { cursor: pointer; }
    .card { background: #16161f; border: 1px solid #2a2a3d; border-radius: 16px; padding: 24px; }
    .label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #6c6c8a; margin-bottom: 8px; display: block; }
    .input { width: 100%; background: #0e0e14; border: 1.5px solid #2a2a3d; border-radius: 10px; padding: 10px 14px; color: #e8e6f0; font-family: inherit; font-size: 16px; transition: border-color .2s; }
    @media (min-width: 480px) { .input { font-size: 14px; } }
    .input:focus { border-color: #7c6af7; }
    .input::placeholder { color: #3a3a55; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; border: none; transition: all .15s; }
    .btn-primary { background: #7c6af7; color: #fff; }
    .btn-primary:hover { background: #6a58e5; transform: translateY(-1px); }
    .btn-ghost { background: transparent; border: 1.5px solid #2a2a3d; color: #9090b0; }
    .btn-ghost:hover { border-color: #7c6af7; color: #7c6af7; }
    .btn-danger { background: transparent; border: 1.5px solid #3d2a2a; color: #e05555; }
    .btn-danger:hover { background: #3d1a1a; }
    .pill { display: inline-flex; align-items: center; gap: 6px; background: #1e1e2e; border: 1px solid #2a2a3d; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 500; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    .fade-up { animation: fadeUp .35s ease both; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(14,14,20,.96); backdrop-filter: blur(16px); border-top: 1px solid #1e1e2e; display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom, 4px); transform: translateZ(0); will-change: transform; }

    const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

    // ─── Helpers ─────────────────────────────────────────────────────────────
    const fmt = (n) => new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN" }).format(n);
    const uid = () => Math.random().toString(36).slice(2, 9);

    // ─── Icons ───────────────────────────────────────────────────────────────
    const Icon = ({ name, size = 18 }) => {
      const paths = {
        plus: "M12 5v14M5 12h14",

        clock: "M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zM12 6v6l4 2",
        percent: "M19 5L5 19M6.5 6.5a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm11 11a1 1 0 1 0 0-2 1 1 0 0 0 0 2z",
        zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
        x: "M18 6L6 18M6 6l12 12",
        check: "M20 6L9 17l-5-5",
        history: "M3 3v5h5M3.05 13A9 9 0 1 0 6 5.3L3 8",
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d={paths[name]} />
        </svg>
      );
    };

    // ─── ColorDot ────────────────────────────────────────────────────────────
    const COLOR_MAP = {
      blanco: "#f5f5f5", negro: "#1a1a1a", rojo: "#e53935", azul: "#1e88e5",
      verde: "#43a047", amarillo: "#fdd835", naranja: "#fb8c00", morado: "#8e24aa",
      gris: "#757575", rosa: "#e91e8c", cafe: "#6d4c41",
      transparente: "linear-gradient(135deg,#fff 50%,#ddd 50%)",
      plateado: "linear-gradient(135deg,#ccc,#888)",
      dorado: "linear-gradient(135deg,#fdd835,#f9a825)",
    };
    const ColorDot = ({ color }) => {
      const bg = COLOR_MAP[color?.toLowerCase()] || "#aaa";
      return <span style={{ display:"inline-block", width:14, height:14, borderRadius:"50%", background:bg, border:"1.5px solid rgba(0,0,0,.25)", flexShrink:0, verticalAlign:"middle" }} />;
    };

    // ─── App ─────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState(0);
      const [filaments, setFilaments] = useState(() => load("pq_filaments"));
      const [history, setHistory] = useState(() => load("pq_history"));
      const [showInfo, setShowInfo] = useState(false);

      // ── Quote state lifted here so it survives tab changes ──
      const [brand, setBrand] = useState("");
      const [filId, setFilId] = useState("");
      const [grams, setGrams] = useState("");
      const [qty, setQty] = useState("1");
      const [hours, setHours] = useState("");
      const [mins, setMins] = useState("");
      const [pieceName, setPieceName] = useState("");
      const [clientName, setClientName] = useState("");
      const [orderItems, setOrderItems] = useState([]);
      const [loadedQuote, setLoadedQuote] = useState(null);

      const persistFilaments = (list) => { setFilaments(list); save("pq_filaments", list); };
      const persistHistory   = (list) => { setHistory(list);   save("pq_history", list);   };

      // Load a full quote entry into the cotizador
      const loadQuote = (entry) => { setLoadedQuote(entry); setTab(0); };

      // Load a single item (from order) into cotizador fields only
      const loadItem = (item) => {
        setGrams(String(item.grams||""));
        setQty(String(item.qty||1));
        setPieceName(item.pieceName||"");
        const [fb, ...fcParts] = (item.filament||"").split(" ");
        const fc = fcParts.join(" ");
        const matchedFil = filaments.find(f => f.brand===fb && f.color===fc);
        if (matchedFil) { setBrand(matchedFil.brand); setFilId(matchedFil.id); }
        const match = (item.printTime||"").match(/(\d+)h\s*(\d+)m/);
        if (match) { setHours(match[1]); setMins(match[2]); }
        setTab(0);
      };

      const handleShare = async () => {
        const shareData = { title: "PrintQuote", text: "Cotizador gratuito de impresiones 3D", url: window.location.href };
        if (navigator.share) {
          try { await navigator.share(shareData); } catch {}
        } else {
          try { await navigator.clipboard.writeText(window.location.href); alert("¡Link copiado al portapapeles!"); } catch { alert(window.location.href); }
        }
      };

                    onMouseLeave={e => e.currentTarget.style.borderColor="#2a2a3d"}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
                    GitHub — Danzelote
                  </a>
                  <a href="https://ko-fi.com/danzelot" target="_blank" rel="noopener"
                    style={{ display:"flex", alignItems:"center", gap:10, background:"#0e0e14", border:"1px solid #2a2a3d", borderRadius:10, padding:"11px 14px", textDecoration:"none", color:"#e8e6f0", fontSize:13, fontWeight:600 }}
                    onMouseEnter={e => e.currentTarget.style.borderColor="#FF5E5B"}
                    onMouseLeave={e => e.currentTarget.style.borderColor="#2a2a3d"}>
                    <span style={{ fontSize:18 }}>☕</span> Apóyame en Ko-fi
                  </a>
                </div>
                <p style={{ fontSize:11, color:"#3a3a55", textAlign:"center", marginTop:20 }}>Hecho con ♥ · PrintQuote v1.0</p>
              </div>
            </div>
          )}

          <main style={{ maxWidth:820, margin:"0 auto", padding:"24px 20px 100px" }}>
            {tab === 0 && <QuoteTab
              filaments={filaments} history={history} persistHistory={persistHistory}
              loadedQuote={loadedQuote} clearLoadedQuote={() => setLoadedQuote(null)}
              brand={brand} setBrand={setBrand}
              filId={filId} setFilId={setFilId}
              grams={grams} setGrams={setGrams}
              qty={qty} setQty={setQty}
              hours={hours} setHours={setHours}
              mins={mins} setMins={setMins}
              pieceName={pieceName} setPieceName={setPieceName}
              clientName={clientName} setClientName={setClientName}
              orderItems={orderItems} setOrderItems={setOrderItems}
            />}
            {tab === 1 && <FilamentsTab filaments={filaments} persistFilaments={persistFilaments} />}
            {tab === 2 && <HistoryTab history={history} persistHistory={persistHistory} loadQuote={loadQuote} loadItem={loadItem} setClientName={setClientName} />}
          </main>

          {/* Ko-fi */}
          <a href="https://ko-fi.com/danzelot" target="_blank" rel="noopener"
            style={{ position:"fixed", bottom:"calc(80px + env(safe-area-inset-bottom,0px))", right:18, width:42, height:42, borderRadius:"50%", background:"#FF5E5B", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 2px 12px rgba(0,0,0,.35)", zIndex:999, textDecoration:"none", opacity:.85, transition:"opacity .2s,transform .2s", fontSize:20, transform:"translateZ(0)" }}
            onMouseEnter={e => { e.currentTarget.style.opacity="1"; e.currentTarget.style.transform="scale(1.1)"; }}
            onMouseLeave={e => { e.currentTarget.style.opacity=".85"; e.currentTarget.style.transform="scale(1)"; }}>
            ☕
          </a>

          {/* Bottom nav */}
          <nav className="bottom-nav">
            {[{label:"Cotizar",icon:"zap"},{label:"Filamentos",icon:"spool"},{label:"Historial",icon:"history"}].map(({label,icon},i) => (
              <button key={label} className={`tab-btn${tab===i?" active":""}`} onClick={() => setTab(i)}>
                <Icon name={icon} size={20} />{label}<span className="tab-dot" />
              </button>
            ))}
          </nav>
        </div>
      );
    }

    // ─── Quote Tab ────────────────────────────────────────────────────────────
    function QuoteTab({ filaments, history, persistHistory, loadedQuote, clearLoadedQuote,
      brand, setBrand, filId, setFilId, grams, setGrams, qty, setQty,
      hours, setHours, mins, setMins, pieceName, setPieceName,
      clientName, setClientName, orderItems, setOrderItems }) {
      const brands = [...new Set(filaments.map(f => f.brand))];
      const [watts, setWatts] = useState(() => localStorage.getItem("pq_watts") || "200");
      const [kwh, setKwh] = useState(() => localStorage.getItem("pq_kwh") || "2.8");
      const [waste, setWaste] = useState(() => localStorage.getItem("pq_waste") || "10");
      const [multiplier, setMultiplier] = useState(() => localStorage.getItem("pq_multiplier") || "3");
      // Machine cost state
      const [printerCost, setPrinterCost] = useState(() => localStorage.getItem("pq_printer_cost") || "15000");
      const [extraCost, setExtraCost] = useState(() => localStorage.getItem("pq_extra_cost") || "0");
      const [maintenance, setMaintenance] = useState(() => localStorage.getItem("pq_maintenance") || "1500");
      const [printerLife, setPrinterLife] = useState(() => localStorage.getItem("pq_printer_life") || "5");
      const [activeTime, setActiveTime] = useState(() => localStorage.getItem("pq_active_time") || "50");
      const [bufferFactor, setBufferFactor] = useState(() => localStorage.getItem("pq_buffer") || "1.3");
      const [laborRate, setLaborRate] = useState(() => localStorage.getItem("pq_labor") || "0");
      const [saved, setSaved] = useState(false);

      const saveSettings = (key, val) => localStorage.setItem(key, val);
      const brandFilaments = filaments.filter(f => f.brand === brand);
      const selectedFil = filaments.find(f => f.id === filId);

      // Only auto-select color when user manually changes brand (not when loading from history)
      const prevBrand = React.useRef(brand);
      useEffect(() => {
        if (prevBrand.current === brand) return; // brand didn't actually change
        prevBrand.current = brand;
        // Only reset filId if the current filId doesn't belong to this brand
        const belongs = brandFilaments.some(f => f.id === filId);
        if (!belongs) {
          if (brandFilaments.length === 1) setFilId(brandFilaments[0].id);
          else setFilId("");
        }
      }, [brand]);

      // Load from history
      useEffect(() => {
        if (!loadedQuote) return;
        const entry = loadedQuote;
        // Restore multiplier
        if (entry.multiplier) { setMultiplier(String(entry.multiplier)); saveSettings("pq_multiplier", String(entry.multiplier)); }
        // Restore client name and piece name
        setClientName(entry.clientName || "");
        setPieceName(entry.pieceName || "");
        // For single-piece entries, restore numeric fields
        if (!entry.items) {
          setGrams(String(entry.grams || ""));
          // Parse printTime "Xh Ym"
          const match = (entry.printTime||"").match(/(\d+)h\s*(\d+)m/);
          if (match) { setHours(match[1]); setMins(match[2]); }
          // Try to find filament by name
          const [fb, fc] = (entry.filament||"").split(" ");
          const matchedFil = filaments.find(f => f.brand===fb && f.color===fc);
          if (matchedFil) { setBrand(matchedFil.brand); setFilId(matchedFil.id); }
        }
        clearLoadedQuote();
      }, [loadedQuote]);

      const totalHours = (parseFloat(hours)||0) + (parseFloat(mins)||0)/60;
      const filamentCost = selectedFil ? (parseFloat(grams)||0) * selectedFil.pricePerGram : 0;
      const energyCost = (parseFloat(watts)||0)/1000 * totalHours * (parseFloat(kwh)||0);
      const wasteFactor = 1 + (parseFloat(waste)||0)/100;
      // Machine cost per hour
      const totalInvestment = (parseFloat(printerCost)||0) + (parseFloat(extraCost)||0);
      const annualMaintenance = parseFloat(maintenance)||0;
      const lifeYears = parseFloat(printerLife)||5;
      const activePercent = (parseFloat(activeTime)||50)/100;
      const hoursPerYear = 8760 * activePercent;
      const totalHoursLife = hoursPerYear * lifeYears;
      const depreciationPerHr = totalHoursLife > 0 ? totalInvestment / totalHoursLife : 0;
      const maintenancePerHr = hoursPerYear > 0 ? annualMaintenance / hoursPerYear : 0;
      const machineHrCost = (depreciationPerHr + maintenancePerHr) * (parseFloat(bufferFactor)||1);
      const machineCost = machineHrCost * totalHours;
      const laborCost = (parseFloat(laborRate)||0) * totalHours;
      const unitRealCost = (filamentCost + energyCost + machineCost + laborCost) * wasteFactor;
      const unitSalePrice = unitRealCost * (parseFloat(multiplier)||1);
      const qtyNum = Math.max(1, parseInt(qty)||1);
      const realCost = unitRealCost * qtyNum;
      const salePrice = unitSalePrice * qtyNum;
      const profit = salePrice - realCost;
      const hasResult = unitRealCost > 0;

      const resetPiece = () => { setBrand(""); setFilId(""); setGrams(""); setHours(""); setMins(""); setQty("1"); setPieceName(""); };

      const addToOrder = () => {
        if (!hasResult) return;
        const item = {
          id: uid(),
          pieceName: pieceName || "Pieza",
          filament: selectedFil ? `${selectedFil.brand} ${selectedFil.color}` : "—",
          grams: parseFloat(grams)||0,
          printTime: `${hours||0}h ${mins||0}m`,
          qty: qtyNum,
          unitRealCost, unitSalePrice,
          realCost, salePrice, profit,
        };
        setOrderItems(prev => [...prev, item]);
        resetPiece();
      };

      // Order totals
      const orderRealCost  = orderItems.reduce((s,i) => s + i.realCost,  0);
      const orderSalePrice = orderItems.reduce((s,i) => s + i.salePrice, 0);
      const orderProfit    = orderItems.reduce((s,i) => s + i.profit,    0);
      const hasOrder = orderItems.length > 0;

      const handleSave = () => {
        const isSinglePiece = !hasOrder;
        const entry = {
          id: uid(),
          date: new Date().toISOString(),
          clientName,
          // single piece fields (for backward compat)
          pieceName: isSinglePiece ? (pieceName||"Sin nombre") : `Pedido (${orderItems.length} piezas)`,
          filament: isSinglePiece ? (selectedFil ? `${selectedFil.brand} ${selectedFil.color}` : "—") : "Múltiples",
          grams: isSinglePiece ? (parseFloat(grams)||0)*qtyNum : orderItems.reduce((s,i)=>s+i.grams*i.qty,0),
          printTime: isSinglePiece ? `${hours||0}h ${mins||0}m` : `${orderItems.length} piezas`,
          realCost:  isSinglePiece ? realCost  : orderRealCost,
          salePrice: isSinglePiece ? salePrice : orderSalePrice,
          profit:    isSinglePiece ? profit    : orderProfit,
          multiplier: parseFloat(multiplier),
          // order items (only for multi-piece)
          items: isSinglePiece ? null : orderItems,
        };
        persistHistory([entry, ...history]);
        setSaved(true);
        setTimeout(() => { setSaved(false); setOrderItems([]); setClientName(""); resetPiece(); }, 2000);
      };

      const Row = ({ label, value, accent }) => (
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid #1e1e2e" }}>
          <span style={{ fontSize:13, color:"#6c6c8a" }}>{label}</span>
          <span style={{ fontFamily:"'Space Mono',monospace", fontSize:14, color:accent||"#e8e6f0" }}>{value}</span>
        </div>
      );

      const PRESETS = [
        {label:"Amigos",value:"2",color:"#7cf7b0",desc:"×2"},
        {label:"Mayorista",value:"2.5",color:"#6c9af7",desc:"×2.5"},
        {label:"Minorista",value:"3",color:"#7c6af7",desc:"×3"},
        {label:"Urgente",value:"4",color:"#f7c97c",desc:"×4"},
      ];

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:24 }} className="fade-up">

          {/* Filament selector */}
          <div className="card">
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
              <Icon name="spool" size={16} /><span style={{ fontWeight:700, fontSize:15 }}>Seleccionar Filamento</span>
            </div>
            {filaments.length === 0 ? (
              <p style={{ fontSize:13, color:"#6c6c8a" }}>No tienes filamentos. Ve a la pestaña <b>Filamentos</b> para agregar.</p>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
                <div>
                  <label className="label">Marca</label>
                  <select className="input" value={brand} onChange={e => setBrand(e.target.value)}>
                    <option value="">— Selecciona —</option>
                    {brands.map(b => <option key={b} value={b}>{b}</option>)}
                  </select>
                </div>
                <div>
                  <label className="label">Color</label>
                  <select className="input" value={filId} onChange={e => setFilId(e.target.value)} disabled={!brand}>
                    <option value="">— Selecciona —</option>
                    {brandFilaments.map(f => <option key={f.id} value={f.id}>{f.color} — {fmt(f.pricePerGram)}/g</option>)}
                  </select>
                </div>
              </div>
            )}
            {selectedFil && (
              <div style={{ marginTop:14, display:"flex", gap:10, flexWrap:"wrap" }}>
                <span className="pill"><ColorDot color={selectedFil.color} /> {selectedFil.color}</span>
                <span className="pill"><Icon name="percent" size={12} /> {fmt(selectedFil.pricePerGram)}/g</span>
                <span className="pill">Rollo {selectedFil.rollGrams}g → {fmt(selectedFil.rollPrice)}</span>
              </div>
            )}
          </div>

          {/* Print params */}
          <div className="card">
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
              <Icon name="clock" size={16} /><span style={{ fontWeight:700, fontSize:15 }}>Parámetros de Impresión</span>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, alignItems:"end" }}>
              <div><label className="label">Filamento (g)</label><input className="input" type="number" inputMode="decimal" min="0" placeholder="0" value={grams} onChange={e => setGrams(e.target.value)} /></div>
              <div><label className="label">Horas</label><input className="input" type="number" inputMode="decimal" min="0" placeholder="0" value={hours} onChange={e => setHours(e.target.value)} /></div>
              <div><label className="label">Minutos</label><input className="input" type="number" inputMode="decimal" min="0" max="59" placeholder="0" value={mins} onChange={e => setMins(e.target.value)} /></div>
              <div><label className="label">Cantidad</label><input className="input" type="number" inputMode="decimal" min="1" placeholder="1" value={qty} onChange={e => setQty(e.target.value)} /></div>
            </div>
            <details style={{ marginTop:18 }}>
              <summary style={{ fontSize:12, color:"#6c6c8a", cursor:"pointer", fontWeight:600, letterSpacing:".06em", textTransform:"uppercase" }}>Parámetros avanzados</summary>
              <div style={{ marginTop:16, display:"flex", flexDirection:"column", gap:16 }}>

                {/* Energy */}
                <div style={{ fontSize:11, fontWeight:700, color:"#4a4a6a", textTransform:"uppercase", letterSpacing:".06em", borderBottom:"1px solid #1e1e2e", paddingBottom:6 }}>⚡ Energía</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, alignItems:"end" }}>
                  <div><label className="label">Consumo equipo (W)</label><input className="input" type="number" inputMode="decimal" min="0" value={watts} onChange={e => { setWatts(e.target.value); saveSettings("pq_watts", e.target.value); }} /></div>
                  <div><label className="label">Costo kWh ($)</label><input className="input" type="number" inputMode="decimal" min="0" step="0.01" value={kwh} onChange={e => { setKwh(e.target.value); saveSettings("pq_kwh", e.target.value); }} /></div>
                </div>
                <div>
                  <label className="label" style={{ display:"flex", justifyContent:"space-between" }}>
                    <span>% Merma / Fallas</span>
                    <span style={{ fontFamily:"'Space Mono',monospace", color:"#a78bfa" }}>{waste}%</span>
                  </label>
                  <div className="input" style={{ display:"flex", alignItems:"center", gap:8, padding:"0 14px" }}>
                    <span style={{ fontSize:11, color:"#6c6c8a", flexShrink:0 }}>0%</span>
                    <input type="range" min="0" max="30" value={waste} onChange={e => { setWaste(e.target.value); saveSettings("pq_waste", e.target.value); }} style={{ flex:1, accentColor:"#7c6af7", cursor:"pointer" }} />
                    <span style={{ fontSize:11, color:"#6c6c8a", flexShrink:0 }}>30%</span>
                  </div>
                </div>

                {/* Machine cost */}
                <div style={{ fontSize:11, fontWeight:700, color:"#4a4a6a", textTransform:"uppercase", letterSpacing:".06em", borderBottom:"1px solid #1e1e2e", paddingBottom:6, marginTop:4 }}>🖨️ Desgaste de la impresora</div>
                <div style={{ background:"#0e0e14", borderRadius:10, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:12, color:"#6c6c8a" }}>Costo/hora de máquina calculado</span>
                  <span style={{ fontFamily:"'Space Mono',monospace", fontSize:14, color: machineHrCost > 0 ? "#f7c97c" : "#3a3a55" }}>{fmt(machineHrCost)}/hr</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, alignItems:"end" }}>
                  <div><label className="label">Costo impresora ($)</label><input className="input" type="number" inputMode="decimal" min="0" value={printerCost} onChange={e => { setPrinterCost(e.target.value); saveSettings("pq_printer_cost", e.target.value); }} /></div>
                  <div><label className="label">Extras / accesorios ($)</label><input className="input" type="number" inputMode="decimal" min="0" value={extraCost} onChange={e => { setExtraCost(e.target.value); saveSettings("pq_extra_cost", e.target.value); }} /></div>
                  <div><label className="label">Mantenimiento anual ($)</label><input className="input" type="number" inputMode="decimal" min="0" value={maintenance} onChange={e => { setMaintenance(e.target.value); saveSettings("pq_maintenance", e.target.value); }} /></div>
                  <div><label className="label">Vida estimada (años)</label><input className="input" type="number" inputMode="decimal" min="1" max="20" value={printerLife} onChange={e => { setPrinterLife(e.target.value); saveSettings("pq_printer_life", e.target.value); }} /></div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, alignItems:"end" }}>
                  <div>
                    <label className="label" style={{ display:"flex", justifyContent:"space-between" }}>
                      <span>% Tiempo activo</span>
                      <span style={{ fontFamily:"'Space Mono',monospace", color:"#f7c97c" }}>{activeTime}%</span>
                    </label>
                    <div className="input" style={{ display:"flex", alignItems:"center", gap:6, padding:"0 12px" }}>
                      <input type="range" min="10" max="100" value={activeTime} onChange={e => { setActiveTime(e.target.value); saveSettings("pq_active_time", e.target.value); }} style={{ flex:1, accentColor:"#f7c97c", cursor:"pointer" }} />
                    </div>
                  </div>
                  <div>
                    <label className="label" style={{ display:"flex", justifyContent:"space-between" }}>
                      <span>Factor búfer</span>
                      <span style={{ fontFamily:"'Space Mono',monospace", color:"#f7c97c" }}>{parseFloat(bufferFactor).toFixed(1)}×</span>
                    </label>
                    <div className="input" style={{ display:"flex", alignItems:"center", gap:6, padding:"0 12px" }}>
                      <input type="range" min="1" max="2" step="0.1" value={bufferFactor} onChange={e => { setBufferFactor(e.target.value); saveSettings("pq_buffer", e.target.value); }} style={{ flex:1, accentColor:"#f7c97c", cursor:"pointer" }} />
                    </div>
                  </div>
                </div>

                {/* Labor */}
                <div style={{ fontSize:11, fontWeight:700, color:"#4a4a6a", textTransform:"uppercase", letterSpacing:".06em", borderBottom:"1px solid #1e1e2e", paddingBottom:6, marginTop:4 }}>👷 Mano de obra</div>
                <div>
                  <label className="label" style={{ display:"flex", justifyContent:"space-between" }}>
                    <span>Tarifa por hora ($/hr)</span>
                    <span style={{ fontSize:11, color:"#6c6c8a" }}>{parseFloat(laborRate)===0 ? "No aplica (hobby)" : fmt(parseFloat(laborRate)*totalHours) + " total"}</span>
                  </label>
                  <input className="input" type="number" inputMode="decimal" min="0" placeholder="0 = no cobrar mano de obra" value={laborRate} onChange={e => { setLaborRate(e.target.value); saveSettings("pq_labor", e.target.value); }} />
                </div>

              </div>
            </details>
          </div>

          {/* Cost result for current piece */}
          {hasResult && (
            <div className="card fade-up" style={{ borderColor:"#2a2a4d" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
                <Icon name="zap" size={16} /><span style={{ fontWeight:700, fontSize:15 }}>Costos{qtyNum > 1 ? ` (×${qtyNum} piezas)` : ""}</span>
              </div>
              <p style={{ fontSize:12, color:"#6c6c8a", marginBottom:20 }}>Desglose de la pieza actual</p>
              <Row label="Filamento" value={fmt(filamentCost)} />
              <Row label="Energía eléctrica" value={fmt(energyCost)} />
              {machineCost > 0 && <Row label={`Desgaste impresora (${fmt(machineHrCost)}/hr)`} value={fmt(machineCost)} />}
              {laborCost > 0 && <Row label={`Mano de obra (${fmt(parseFloat(laborRate))}/hr)`} value={fmt(laborCost)} />}
              <Row label={`Merma (${waste}%)`} value={fmt((filamentCost+energyCost+machineCost+laborCost)*(parseFloat(waste)/100))} />
              <Row label={qtyNum>1?`Costo unitario real`:"Costo real unitario"} value={fmt(unitRealCost)} />
              {qtyNum > 1 && <Row label={`Costo real total (×${qtyNum})`} value={fmt(realCost)} accent="#a78bfa" />}
              {qtyNum === 1 && <Row label="Costo real total" value={fmt(realCost)} accent="#a78bfa" />}

              {/* Multiplier / sale price */}
              <div style={{ marginTop:24, background:"#1a1a2e", borderRadius:12, padding:20 }}>
                <div style={{ marginBottom:14 }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
                    <span style={{ fontWeight:700, fontSize:15 }}>Precio de Venta</span>
                    <div style={{ textAlign:"right" }}>
                      <span style={{ fontFamily:"'Space Mono',monospace", fontSize:20, color:"#a78bfa", fontWeight:700 }}>×{parseFloat(multiplier).toFixed(1)}</span>
                      <span style={{ fontSize:11, color:"#6c6c8a", display:"block" }}>sobre costo real</span>
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
                    {PRESETS.map(p => (
                      <button key={p.label} onClick={() => { setMultiplier(p.value); saveSettings("pq_multiplier", p.value); }}
                        style={{ flex:1, minWidth:60, padding:"8px 4px", borderRadius:8,
                          border:`1.5px solid ${parseFloat(multiplier)===parseFloat(p.value) ? p.color : "#2a2a3d"}`,
                          background: parseFloat(multiplier)===parseFloat(p.value) ? p.color+"22" : "transparent",
                          color: parseFloat(multiplier)===parseFloat(p.value) ? p.color : "#6c6c8a",
                          fontSize:10, fontWeight:700, fontFamily:"inherit", cursor:"pointer", transition:"all .2s", lineHeight:1.4 }}>
                        {p.label}<br/><span style={{ fontFamily:"'Space Mono',monospace", fontSize:11 }}>{p.desc}</span>
                      </button>
                    ))}
                  </div>
                  <input type="range" min="1.2" max="6" step="0.1" value={multiplier}
                    onChange={e => { setMultiplier(e.target.value); saveSettings("pq_multiplier", e.target.value); }}
                    style={{ width:"100%", accentColor:"#7c6af7", cursor:"pointer" }} />
                  <div style={{ position:"relative", height:44, marginTop:4 }}>
                    {[{val:2,label:"Amigos",color:"#7cf7b0",row:0},{val:2.5,label:"Mayorista",color:"#6c9af7",row:1},{val:3,label:"Minorista",color:"#7c6af7",row:0},{val:4,label:"Urgente",color:"#f7c97c",row:1}].map(m => {
                      const left = ((m.val-1.2)/(6-1.2))*100;
                      return (
                        <div key={m.val} style={{ position:"absolute", left:`${left}%`, top:m.row===0?0:20, transform:"translateX(-50%)", textAlign:"center", pointerEvents:"none" }}>
                          <div style={{ width:1, height:4, background:m.color+"88", margin:"0 auto 2px" }} />
                          <span style={{ fontSize:9, color:m.color+"cc", whiteSpace:"nowrap", fontWeight:700 }}>{m.label}</span>
                        </div>
                      );
                    })}

                <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
                  <div style={{ flex:1, minWidth:120, background:"#0e0e14", borderRadius:10, padding:"14px 18px" }}>
                    <div className="label" style={{ marginBottom:6 }}>Precio venta{qtyNum>1?` ×${qtyNum}`:""}</div>
                    <div style={{ fontFamily:"'Space Mono',monospace", fontSize:22, color:"#7cf7b0", fontWeight:700 }}>{fmt(salePrice)}</div>
                    {qtyNum>1 && <div style={{ fontSize:11, color:"#6c6c8a", marginTop:4 }}>Unitario: {fmt(unitSalePrice)}</div>}
                  </div>
                  <div style={{ flex:1, minWidth:120, background:"#0e0e14", borderRadius:10, padding:"14px 18px" }}>
                    <div className="label" style={{ marginBottom:6 }}>Ganancia neta</div>
                    <div style={{ fontFamily:"'Space Mono',monospace", fontSize:22, color:"#f7c97c", fontWeight:700 }}>{fmt(profit)}</div>
                  </div>
                </div>
              </div>

              {/* Actions: add to order OR save single */}
              <div style={{ marginTop:20, paddingTop:20, borderTop:"1px solid #1e1e2e", display:"flex", flexDirection:"column", gap:12 }}>
                <input className="input" placeholder="Nombre de la pieza (opcional)" value={pieceName} onChange={e => setPieceName(e.target.value)} />
                <button className="btn btn-ghost" style={{ width:"100%", justifyContent:"center" }} onClick={addToOrder}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
                  Agregar al pedido{hasOrder ? ` (${orderItems.length} pieza${orderItems.length!==1?"s":""})` : ""}
                </button>
              </div>
            </div>
          )}

          {/* Order summary */}
          {hasOrder && (
            <div className="card fade-up" style={{ borderColor:"#2a4a2a" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <Icon name="history" size={16} />
                  <span style={{ fontWeight:700, fontSize:15 }}>Pedido</span>
                  <span className="pill" style={{ fontSize:11 }}>{orderItems.reduce((s,i)=>s+i.qty,0)} pieza{orderItems.reduce((s,i)=>s+i.qty,0)!==1?"s":""}</span>
                </div>
                <button onClick={() => setOrderItems([])}
                  style={{ background:"none", border:"none", color:"#6c6c8a", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>
                  Limpiar
                </button>
              </div>

              {/* Item list */}
              <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:16 }}>
                {orderItems.map((item,i) => (
                  <div key={item.id} style={{ display:"flex", alignItems:"center", gap:10, background:"#0e0e14", borderRadius:10, padding:"10px 14px" }}>
                    <div style={{ flex:1 }}>
                      <span style={{ fontWeight:600, fontSize:13 }}>{item.pieceName}</span>
                      <span style={{ fontSize:11, color:"#6c6c8a", marginLeft:8 }}>{item.filament}</span>
                      {item.qty > 1 && <span style={{ fontSize:11, color:"#a78bfa", marginLeft:6 }}>×{item.qty}</span>}
                    </div>
                    <div style={{ textAlign:"right", marginRight:8 }}>
                      <div style={{ fontFamily:"'Space Mono',monospace", fontSize:13, color:"#7cf7b0" }}>{fmt(item.salePrice)}</div>
                      <div style={{ fontSize:10, color:"#6c6c8a" }}>costo {fmt(item.realCost)}</div>
                    </div>
                    <button onClick={() => setOrderItems(prev => prev.filter(x=>x.id!==item.id))}
                      style={{ background:"none", border:"none", color:"#6c6c8a", cursor:"pointer", padding:"4px" }}>
                      <Icon name="x" size={14} />
                    </button>
                  </div>
                ))}
              </div>

              {/* Order totals */}
              <div style={{ background:"#1a2a1a", borderRadius:10, padding:"14px 16px", marginBottom:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                  <span style={{ fontSize:13, color:"#6c6c8a" }}>Total costo real</span>
                  <span style={{ fontFamily:"'Space Mono',monospace", fontSize:14, color:"#a78bfa" }}>{fmt(orderRealCost)}</span>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                  <span style={{ fontSize:13, color:"#6c6c8a" }}>Total precio venta</span>
                  <span style={{ fontFamily:"'Space Mono',monospace", fontSize:16, color:"#7cf7b0", fontWeight:700 }}>{fmt(orderSalePrice)}</span>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  <span style={{ fontSize:13, color:"#6c6c8a" }}>Ganancia total</span>
                  <span style={{ fontFamily:"'Space Mono',monospace", fontSize:16, color:"#f7c97c", fontWeight:700 }}>{fmt(orderProfit)}</span>
                </div>
              </div>

              {/* Save order */}
              <input className="input" placeholder="Nombre del cliente (opcional)" value={clientName} onChange={e => setClientName(e.target.value)} style={{ marginBottom:12 }} />
              <button className="btn btn-primary" style={{ width:"100%", justifyContent:"center" }} onClick={handleSave} disabled={saved}
                style={{ width:"100%", justifyContent:"center", background:saved?"#2a4a3a":"#7c6af7" }}>
                {saved ? <><Icon name="check" size={15} /> Pedido guardado</> : <><Icon name="save" size={15} /> Guardar pedido en historial</>}
              </button>
            </div>
          )}

          {/* Save single piece (when no order items) */}
          {hasResult && !hasOrder && (
            <div className="card" style={{ padding:"16px 20px" }}>
              <p style={{ fontSize:12, color:"#6c6c8a", marginBottom:12 }}>O guarda esta pieza directamente</p>
              <input className="input" placeholder="Nombre del cliente (opcional)" value={clientName} onChange={e => setClientName(e.target.value)} style={{ marginBottom:12 }} />
              <button className="btn btn-primary" onClick={handleSave} disabled={saved}
                style={{ background:saved?"#2a4a3a":"#7c6af7" }}>
                {saved ? <><Icon name="check" size={15} /> Guardado</> : <><Icon name="save" size={15} /> Guardar cotización</>}
              </button>
            </div>
          )}

        </div>
      );
    }

    // ─── Filaments Tab ────────────────────────────────────────────────────────
    function FilamentsTab({ filaments, persistFilaments }) {
      const empty = { brand:"", color:"", material:"PLA", rollGrams:"1000", rollPrice:"" };
      const [form, setForm] = useState(empty);
      const [editId, setEditId] = useState(null);
      const [error, setError] = useState("");
      const [collapsed, setCollapsed] = useState({});
      const [importMsg, setImportMsg] = useState("");

      const set = (k,v) => setForm(p => ({...p,[k]:v}));
      const toggleCollapse = (brand) => setCollapsed(p => ({...p,[brand]:!p[brand]}));

      const validate = () => {
        if (!form.brand.trim()) return "Ingresa la marca.";
        if (!form.color.trim()) return "Ingresa el color.";
        if (!form.rollPrice || isNaN(parseFloat(form.rollPrice))) return "Ingresa el costo del rollo.";
        if (!form.rollGrams || isNaN(parseFloat(form.rollGrams))) return "Ingresa los gramos del rollo.";
        return "";
      };

      const handleSave = () => {
        const err = validate(); if (err) { setError(err); return; } setError("");
        const pricePerGram = parseFloat(form.rollPrice)/parseFloat(form.rollGrams);
        if (editId) {
          persistFilaments(filaments.map(f => f.id===editId ? {...form,id:editId,rollPrice:parseFloat(form.rollPrice),rollGrams:parseFloat(form.rollGrams),pricePerGram} : f));
          setEditId(null);
        } else {
          persistFilaments([...filaments, {...form,id:uid(),rollPrice:parseFloat(form.rollPrice),rollGrams:parseFloat(form.rollGrams),pricePerGram}]);
        }
        setForm(empty);
      };

      const startEdit = (f) => { setForm({brand:f.brand,color:f.color,material:f.material,rollGrams:String(f.rollGrams),rollPrice:String(f.rollPrice)}); setEditId(f.id); };
      const cancelEdit = () => { setForm(empty); setEditId(null); setError(""); };

      const handleExport = () => {
        const header = "marca,color,material,gramos_rollo,precio_rollo";
        const rows = filaments.map(f => [f.brand,f.color,f.material,f.rollGrams,f.rollPrice].map(v => `"${String(v).replace(/"/g,'""')}"`).join(","));
        const csv = [header,...rows].join("\n");
        const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href=url; a.download="printquote-filamentos.csv"; a.click(); URL.revokeObjectURL(url);
      };

      const handleImport = (e) => {
        const file = e.target.files?.[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const lines = ev.target.result.trim().split("\n").filter(Boolean);
            if (lines.length < 2) throw new Error();
            const parseRow = (line) => { const cols=[]; let cur="",inQ=false; for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur);cur="";}else cur+=ch;} cols.push(cur); return cols.map(c=>c.trim()); };
            const imported = lines.slice(1).map(line => { const [brand,color,material,rollGrams,rollPrice]=parseRow(line); if(!brand||!color) return null; const rg=parseFloat(rollGrams)||1000,rp=parseFloat(rollPrice)||0; return {id:uid(),brand,color,material:material||"PLA",rollGrams:rg,rollPrice:rp,pricePerGram:rp/rg}; }).filter(Boolean);
            const existingKey = new Set(filaments.map(f=>f.brand+"|"+f.color));
            const toAdd = imported.filter(f=>!existingKey.has(f.brand+"|"+f.color));
            persistFilaments([...filaments,...toAdd]);
            setImportMsg(`✓ ${toAdd.length} filamento${toAdd.length!==1?"s":""} importado${toAdd.length!==1?"s":""}`);
          } catch { setImportMsg("✗ Archivo inválido"); }
          setTimeout(()=>setImportMsg(""),3000);
        };
        reader.readAsText(file); e.target.value="";
      };

      const grouped = filaments.reduce((acc,f) => { (acc[f.brand]=acc[f.brand]||[]).push(f); return acc; },{});
      const uniqueBrands = [...new Set(filaments.map(f => f.brand))];
      const colorsForBrand = [...new Set(filaments.filter(f => f.brand === form.brand).map(f => f.color))];

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:24 }} className="fade-up">
          <div className="card">
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
              <Icon name={editId?"edit":"plus"} size={16} />
              <span style={{ fontWeight:700, fontSize:15 }}>{editId?"Editar Filamento":"Agregar Filamento"}</span>
            </div>
            {/* datalists for autocomplete */}
            <datalist id="brands-list">
              {uniqueBrands.map(b => <option key={b} value={b} />)}
            </datalist>
            <datalist id="colors-list">
              {colorsForBrand.map(c => <option key={c} value={c} />)}
            </datalist>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:14 }}>
              <div><label className="label">Marca</label><input className="input" list="brands-list" placeholder="Ej: Bambu Lab" value={form.brand} onChange={e=>set("brand",e.target.value)} /></div>
              <div><label className="label">Color</label><input className="input" list="colors-list" placeholder="Ej: Rojo, Azul…" value={form.color} onChange={e=>set("color",e.target.value)} /></div>
              <div>
                <label className="label">Material</label>
                <select className="input" value={form.material} onChange={e=>set("material",e.target.value)}>
                  {["PLA","PLA+","PETG","ABS","ASA","TPU","Resina","Otro"].map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
              <div><label className="label">Gramos por rollo</label><input className="input" type="number" inputMode="decimal" min="1" placeholder="1000" value={form.rollGrams} onChange={e=>set("rollGrams",e.target.value)} /></div>
              <div style={{ gridColumn:"1 / -1" }}><label className="label">Costo del rollo ($)</label><input className="input" type="number" inputMode="decimal" min="0" step="0.01" placeholder="0.00" value={form.rollPrice} onChange={e=>set("rollPrice",e.target.value)} /></div>
            </div>
            {error && <p style={{ fontSize:12, color:"#e05555", marginTop:10 }}>{error}</p>}
            {form.rollPrice && form.rollGrams && !isNaN(parseFloat(form.rollPrice)) && (
              <p style={{ fontSize:12, color:"#6c6c8a", marginTop:10 }}>Costo por gramo: <b style={{ color:"#a78bfa" }}>{fmt(parseFloat(form.rollPrice)/parseFloat(form.rollGrams))}</b></p>
            )}
            <div style={{ display:"flex", gap:10, marginTop:18 }}>
              <button className="btn btn-primary" onClick={handleSave}><Icon name="save" size={15} />{editId?"Guardar cambios":"Agregar"}</button>
              {editId && <button className="btn btn-ghost" onClick={cancelEdit}><Icon name="x" size={15} />Cancelar</button>}
            </div>
          </div>

          <div className="card" style={{ padding:"16px 20px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:importMsg?10:0, flexWrap:"wrap" }}>
              <span style={{ fontSize:13, fontWeight:600, color:"#6c6c8a", flex:1 }}>{filaments.length} filamento{filaments.length!==1?"s":""} guardado{filaments.length!==1?"s":""}</span>
              {filaments.length > 0 && (
                <button className="btn btn-ghost" style={{ fontSize:13, padding:"8px 16px" }} onClick={handleExport}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                  Exportar CSV
                </button>
              )}
              <label className="btn btn-ghost" style={{ fontSize:13, padding:"8px 16px", cursor:"pointer" }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                Importar CSV
                <input type="file" accept=".csv" onChange={handleImport} style={{ display:"none" }} />
              </label>
            </div>
            {importMsg && <p style={{ fontSize:12, fontWeight:600, color:importMsg.startsWith("✓")?"#7cf7b0":"#e05555", margin:0 }}>{importMsg}</p>}
          </div>

          {filaments.length === 0 ? (
            <div className="card" style={{ textAlign:"center", color:"#6c6c8a", padding:40 }}>
              <Icon name="spool" size={32} />
              <p style={{ marginTop:12, fontSize:14 }}>Aún no tienes filamentos. Agrega el primero arriba.</p>
            </div>
          ) : Object.entries(grouped).map(([brand,items]) => {
            const isCollapsed = collapsed[brand];
            return (
              <div key={brand} className="card" style={{ padding:0, overflow:"hidden" }}>
                <button onClick={() => toggleCollapse(brand)}
                  style={{ width:"100%", display:"flex", alignItems:"center", gap:12, padding:"16px 20px", background:"none", border:"none", cursor:"pointer", textAlign:"left" }}>
                  <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                    {items.slice(0,5).map(f=><ColorDot key={f.id} color={f.color} />)}
                    {items.length>5 && <span style={{ fontSize:10, color:"#6c6c8a", alignSelf:"center" }}>+{items.length-5}</span>}
                  </div>
                  <span style={{ fontWeight:700, fontSize:14, color:"#e8e6f0", flex:1 }}>{brand}</span>
                  <span style={{ fontSize:11, color:"#6c6c8a", marginRight:8 }}>{items.length} color{items.length!==1?"es":""}</span>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6c6c8a" strokeWidth="2.5" strokeLinecap="round"
                    style={{ transition:"transform .25s", transform:isCollapsed?"rotate(-90deg)":"rotate(0deg)", flexShrink:0 }}>
                    <path d="M6 9l6 6 6-6" />
                  </svg>
                </button>
                {!isCollapsed && (
                  <div style={{ padding:"0 12px 12px", display:"flex", flexDirection:"column", gap:8 }}>
                    {items.map(f => (
                      <div key={f.id} style={{ display:"flex", alignItems:"center", gap:12, background:"#0e0e14", borderRadius:10, padding:"12px 14px" }}>
                        <ColorDot color={f.color} />
                        <div style={{ flex:1 }}>
                          <span style={{ fontWeight:600, fontSize:14 }}>{f.color}</span>
                          <span style={{ marginLeft:10, fontSize:11, color:"#6c6c8a" }}>{f.material}</span>
                        </div>
                        <div style={{ textAlign:"right", marginRight:12 }}>
                          <div style={{ fontFamily:"'Space Mono',monospace", fontSize:13, color:"#7cf7b0" }}>{fmt(f.pricePerGram)}/g</div>
                          <div style={{ fontSize:11, color:"#6c6c8a" }}>Rollo {f.rollGrams}g · {fmt(f.rollPrice)}</div>
                        </div>
                        <button className="btn btn-ghost" style={{ padding:"7px 12px" }} onClick={()=>startEdit(f)}><Icon name="edit" size={14} /></button>
                        <button className="btn btn-danger" style={{ padding:"7px 12px" }} onClick={()=>persistFilaments(filaments.filter(x=>x.id!==f.id))}><Icon name="trash" size={14} /></button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ─── History Tab ──────────────────────────────────────────────────────────
    function HistoryTab({ history, persistHistory, loadQuote, loadItem, setClientName }) {
      const del = (id) => persistHistory(history.filter(h=>h.id!==id));
      const [expanded, setExpanded] = useState(null);
      const toggle = (id) => setExpanded(p => p===id ? null : id);
      if (history.length === 0) return (
        <div className="card fade-up" style={{ textAlign:"center", color:"#6c6c8a", padding:48 }}>
          <Icon name="history" size={36} />
          <p style={{ marginTop:14, fontSize:14 }}>Aún no tienes cotizaciones guardadas.</p>
        </div>
      );
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }} className="fade-up">
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
            <span style={{ fontSize:13, color:"#6c6c8a" }}>{history.length} cotizaci{history.length===1?"ón":"ones"} guardadas</span>
            <button className="btn btn-danger" style={{ fontSize:12, padding:"6px 14px" }}
              onClick={()=>{ if(confirm("¿Borrar todo el historial?")) persistHistory([]); }}>
              <Icon name="trash" size={13} />Limpiar historial
            </button>
          </div>
          {history.map(h => (
            <div key={h.id} className="card" style={{ padding:0, overflow:"hidden" }}>
              {/* Header row — tappable to expand */}
              <button onClick={() => toggle(h.id)}
                style={{ width:"100%", display:"flex", alignItems:"center", gap:12, padding:"14px 16px", background:"none", border:"none", cursor:"pointer", textAlign:"left" }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:3 }}>
                    <span style={{ fontWeight:700, fontSize:15, color:"#e8e6f0" }}>{h.pieceName||"Sin nombre"}</span>
                    {h.clientName && <span className="pill" style={{ fontSize:11 }}>{h.clientName}</span>}
                    {h.items && <span className="pill" style={{ fontSize:11, borderColor:"#2a4a2a", color:"#7cf7b0" }}>Pedido</span>}
                  </div>
                  <div style={{ fontSize:12, color:"#6c6c8a" }}>
                    {new Date(h.date).toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}
                    {" · "}<span style={{ fontFamily:"'Space Mono',monospace", color:"#7cf7b0" }}>{fmt(h.salePrice)}</span>
                  </div>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6c6c8a" strokeWidth="2.5" strokeLinecap="round"
                  style={{ transition:"transform .25s", transform:expanded===h.id?"rotate(0deg)":"rotate(-90deg)", flexShrink:0 }}>
                  <path d="M6 9l6 6 6-6" />
                </svg>
              </button>

              {/* Expanded content */}
              {expanded === h.id && (
                <div style={{ padding:"0 16px 16px", borderTop:"1px solid #1e1e2e" }}>
                  <p style={{ fontSize:12, color:"#6c6c8a", margin:"12px 0 10px" }}>
                    {h.filament}{" · "}{h.grams}g{" · "}{h.printTime}
                  </p>
                  {h.items && (
                    <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:12 }}>
                      <div style={{ fontSize:11, color:"#6c6c8a", fontWeight:600, letterSpacing:".06em", textTransform:"uppercase", marginBottom:2 }}>Piezas del pedido</div>
                      {h.items.map(item => (
                        <div key={item.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px", background:"#0e0e14", borderRadius:9 }}>
                          <div style={{ flex:1, minWidth:0 }}>
                            <span style={{ fontSize:13, color:"#e8e6f0", fontWeight:600 }}>{item.qty>1?`×${item.qty} `:""}{item.pieceName}</span>
                            <span style={{ fontSize:11, color:"#4a4a6a", marginLeft:6 }}>{item.filament}</span>
                          </div>
                          <span style={{ fontFamily:"'Space Mono',monospace", fontSize:12, color:"#7cf7b0", flexShrink:0, marginRight:6 }}>{fmt(item.salePrice)}</span>
                          <button onClick={() => { setClientName(h.clientName||""); loadItem(item); }}
                            style={{ background:"#1e1e2e", border:"1px solid #2a2a3d", borderRadius:7, padding:"4px 10px", color:"#a78bfa", fontSize:11, fontWeight:700, fontFamily:"inherit", cursor:"pointer", flexShrink:0, whiteSpace:"nowrap" }}>
                            Editar
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{ display:"flex", gap:16, flexWrap:"wrap", marginBottom:14 }}>
                    <div><div className="label" style={{ fontSize:10 }}>Costo real</div><div style={{ fontFamily:"'Space Mono',monospace", fontSize:15, color:"#a78bfa" }}>{fmt(h.realCost)}</div></div>
                    <div><div className="label" style={{ fontSize:10 }}>Precio venta</div><div style={{ fontFamily:"'Space Mono',monospace", fontSize:15, color:"#7cf7b0" }}>{fmt(h.salePrice)}</div></div>
                    <div><div className="label" style={{ fontSize:10 }}>Ganancia</div><div style={{ fontFamily:"'Space Mono',monospace", fontSize:15, color:"#f7c97c" }}>{fmt(h.profit)}</div></div>
                    <div><div className="label" style={{ fontSize:10 }}>Multiplicador</div><div style={{ fontFamily:"'Space Mono',monospace", fontSize:15 }}>×{h.multiplier||"-"}</div></div>
                  </div>
                  <div style={{ display:"flex", gap:8 }}>
                    <button className="btn btn-ghost" style={{ flex:1, justifyContent:"center", fontSize:13, padding:"8px" }}
                      onClick={() => loadQuote(h)}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                      Cargar en cotizador
                    </button>
                    <button className="btn btn-danger" style={{ padding:"8px 14px" }} onClick={()=>del(h.id)}>
                      <Icon name="trash" size={14} />
                    </button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    // ─── Mount ────────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
